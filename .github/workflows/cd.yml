name: AeroStride CD (Deployment)

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BE: pnam-it309/aerostride/backend
  IMAGE_NAME_FE: pnam-it309/aerostride/frontend

jobs:
  # Stage 3: Release & Publish
  release-and-publish:
    runs-on: ubuntu-latest
    name: Semantic Release & Publish to GHCR
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
    permissions:
      packages: write
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker (BE)
        if: steps.semantic.outputs.new_release_published == 'true'
        id: meta-be
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BE }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.semantic.outputs.new_release_version }}
            type=sha
            type=raw,value=latest

      - name: Build and Push Backend
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/BE.Dockerfile
          push: true
          tags: ${{ steps.meta-be.outputs.tags }}
          labels: ${{ steps.meta-be.outputs.labels }}

      - name: Extract metadata for Docker (FE)
        if: steps.semantic.outputs.new_release_published == 'true'
        id: meta-fe
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FE }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.semantic.outputs.new_release_version }}
            type=sha
            type=raw,value=latest

      - name: Build and Push Frontend
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/FE.Dockerfile
          push: true
          tags: ${{ steps.meta-fe.outputs.tags }}
          labels: ${{ steps.meta-fe.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}

      - name: Slack Notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow,job,took
          text: 'CD Pipeline ${{ job.status }} for version ${{ steps.semantic.outputs.new_release_version }}'
        if: always() && env.SLACK_WEBHOOK_URL != ''

  # Stage 4: Deployment to Self-hosted Runner (Dell PC)
  deploy:
    needs: release-and-publish
    if: needs.release-and-publish.outputs.new_release_published == 'true'
    runs-on: self-hosted
    name: Deploy to On-Premise Server
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Production .env
        run: |
          cp docker/.env .env

      - name: Pull and Start Services
        env:
          BACKEND_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BE }}:latest
          FRONTEND_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FE }}:latest
        run: |
          docker compose -f docker/docker-compose.yml pull backend
          docker compose -f docker/docker-compose.yml pull frontend
          docker compose -f docker/docker-compose.yml up -d --remove-orphans

      - name: Slack Notification (Deployment Status)
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow,job,took
          text: 'Deployment to Dell PC ${{ job.status }}'
        if: always() && env.SLACK_WEBHOOK_URL != ''

      - name: Cleanup old images
        run: docker image prune -f
        if: always()
