spring.application.name=AeroStride-BE
spring.profiles.default=local

# Server Configuration
server.port=${SERVER_PORT:8080}
app.base_url=${APP_BASE_URL:http://localhost:8080}
app.api_prefix=${APP_API_PREFIX:/api/v1}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true
spring.flyway.clean-on-validation-error=true
spring.flyway.clean-disabled=false

# Mail Configuration
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}

# Thymeleaf Configuration for Emails
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Custom App Properties
allowed.origin=${ALLOWED_ORIGIN:http://localhost:5173}

# Cloudinary Configuration
cloudinary.cloud_name=${CLOUDINARY_NAME:}
cloudinary.api_key=${CLOUDINARY_KEY:}
cloudinary.api_secret=${CLOUDINARY_SECRET:}

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false
spring.cache.type=${SPRING_CACHE_TYPE:simple}

# VNPay Configuration
vnpay.tmn_code=${VNP_TMN_CODE:}
vnpay.hash_secret=${VNP_HASH_SECRET:}
vnpay.url=${VNP_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.client_ip=${VNP_CLIENT_IP:127.0.0.1}

# Order Configuration
order.cleanup.threshold_ms=${ORDER_CLEANUP_THRESHOLD_MS:86400000}

# JWT Configuration
jwt.secret=${JWT_SECRET:change-me-local-jwt-secret-key-1234567890-change-me}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh_expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Default Admin Bootstrap
app.bootstrap.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:true}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.admin.username=${APP_BOOTSTRAP_ADMIN_USERNAME:}
app.bootstrap.admin.name=${APP_BOOTSTRAP_ADMIN_NAME:Admin He Thong}
app.bootstrap.admin.phone=${APP_BOOTSTRAP_ADMIN_PHONE:0123456789}
app.bootstrap.admin.birth-date=${APP_BOOTSTRAP_ADMIN_BIRTH_DATE:2002-06-19}
app.bootstrap.admin.gender=${APP_BOOTSTRAP_ADMIN_GENDER:true}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.mongo.enabled=false
management.health.mail.enabled=false
management.health.redis.enabled=false

# Spring Batch Configuration
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# Console Decoration
spring.output.ansi.enabled=ALWAYS
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}
