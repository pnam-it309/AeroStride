spring.application.name=AeroStride-BE
spring.profiles.active=${SPRING_PROFILES_ACTIVE}

# Server Configuration
server.port=${SERVER_PORT}
app.base_url=${APP_BASE_URL}
app.api_prefix=${APP_API_PREFIX}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/seeds
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true
spring.flyway.clean-on-validation-error=false
spring.flyway.clean-disabled=true
spring.flyway.encoding=UTF-8


# Mail Configuration
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED}
spring.mail.properties.mail.debug=${MAIL_DEBUG}

# Thymeleaf Configuration for Emails
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Custom App Properties
allowed.origin=${ALLOWED_ORIGIN}

# Cloudinary Configuration
cloudinary.cloud_name=${CLOUDINARY_NAME}
cloudinary.api_key=${CLOUDINARY_KEY}
cloudinary.api_secret=${CLOUDINARY_SECRET}

# Redis Configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.repositories.enabled=false
spring.cache.type=${SPRING_CACHE_TYPE}

# VNPay Configuration
vnpay.tmn_code=${VNP_TMN_CODE}
vnpay.hash_secret=${VNP_HASH_SECRET}
vnpay.url=${VNP_URL}
vnpay.client_ip=${VNP_CLIENT_IP}

# Order Configuration
order.cleanup.threshold_ms=${ORDER_CLEANUP_THRESHOLD_MS}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh_expiration=${JWT_REFRESH_EXPIRATION}

# Default Admin Bootstrap
app.bootstrap.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD}
app.bootstrap.admin.username=${APP_BOOTSTRAP_ADMIN_USERNAME}
app.bootstrap.admin.name=${APP_BOOTSTRAP_ADMIN_NAME}
app.bootstrap.admin.phone=${APP_BOOTSTRAP_ADMIN_PHONE}
app.bootstrap.admin.birth-date=${APP_BOOTSTRAP_ADMIN_BIRTH_DATE}
app.bootstrap.admin.gender=${APP_BOOTSTRAP_ADMIN_GENDER}

# Local Storage
app.local-upload-dir=${APP_LOCAL_UPLOAD_DIR}

# Batch
batch.excel.file-path=${BATCH_EXCEL_FILE_PATH}

# Actuator Configuration
management.endpoints.web.exposure.include=${ACTUATOR_ENDPOINTS}
management.endpoint.health.show-details=never
management.health.mongo.enabled=false
management.health.mail.enabled=false
management.health.redis.enabled=false

# Spring Batch Configuration
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# Console Decoration
spring.output.ansi.enabled=always
logging.pattern.console=${LOGPATTERN_CONSOLE}

# Performance: Hikari Connection Pool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Performance: Tomcat Timeout
server.tomcat.connection-timeout=20000

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=ERROR

# Hot Reload Configuration (Docker on Windows)
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s

# Jackson Configuration
spring.jackson.serialization.fail-on-empty-beans=false
