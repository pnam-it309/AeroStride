spring.application.name=AeroStride-BE
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server Configuration
server.port=${SERVER_PORT}
app.base_url=${APP_BASE_URL}
app.api_prefix=${APP_API_PREFIX}
# Public origin a BROWSER uses to reach the site - the frontend, which is not the
# same host as the API during local dev (5173 vs 8080). Used for absolute SEO URLs
# such as the product sitemap. Behind the prod nginx both collapse onto one origin,
# hence the fallback to app.base_url.
app.public_url=${APP_PUBLIC_URL:${APP_BASE_URL}}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/seeds
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true
spring.flyway.clean-on-validation-error=false
spring.flyway.clean-disabled=true
spring.flyway.encoding=UTF-8


# Mail Configuration
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED}
spring.mail.properties.mail.debug=${MAIL_DEBUG}

# Thymeleaf Configuration for Emails
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Custom App Properties
allowed.origin=${ALLOWED_ORIGIN:}

# Redis Configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.repositories.enabled=false
spring.cache.type=${SPRING_CACHE_TYPE}

# VNPay Configuration
vnpay.tmn_code=${VNP_TMN_CODE}
vnpay.hash_secret=${VNP_HASH_SECRET}
vnpay.url=${VNP_URL}
vnpay.client_ip=${VNP_CLIENT_IP}

# Order Configuration
order.cleanup.threshold_ms=${ORDER_CLEANUP_THRESHOLD_MS}

# Guest Chat Cleanup: xóa lịch sử chat khách vãng lai (chưa đăng nhập) không hoạt động.
# threshold-ms = thời gian không có tin nhắn mới trước khi xóa; interval-ms = chu kỳ job chạy.
guest.chat.cleanup.threshold-ms=${GUEST_CHAT_CLEANUP_THRESHOLD_MS:1800000}
guest.chat.cleanup.interval-ms=${GUEST_CHAT_CLEANUP_INTERVAL_MS:300000}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh_expiration=${JWT_REFRESH_EXPIRATION}

# Default Admin Bootstrap
app.bootstrap.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD}
app.bootstrap.admin.username=${APP_BOOTSTRAP_ADMIN_USERNAME}
app.bootstrap.admin.name=${APP_BOOTSTRAP_ADMIN_NAME}
app.bootstrap.admin.phone=${APP_BOOTSTRAP_ADMIN_PHONE}
app.bootstrap.admin.birth-date=${APP_BOOTSTRAP_ADMIN_BIRTH_DATE}
app.bootstrap.admin.gender=${APP_BOOTSTRAP_ADMIN_GENDER}

# Local Storage
app.local-upload-dir=${APP_LOCAL_UPLOAD_DIR}

# Batch
batch.excel.file-path=${BATCH_EXCEL_FILE_PATH}

# Actuator Configuration
management.endpoints.web.exposure.include=${ACTUATOR_ENDPOINTS}
management.endpoint.health.show-details=${ACTUATOR_HEALTH_SHOW_DETAILS:never}

management.health.mail.enabled=false
management.health.redis.enabled=false

# Spring Batch Configuration
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# Console Decoration
spring.output.ansi.enabled=always
logging.pattern.console=${LOGPATTERN_CONSOLE}

# Performance: Hikari Connection Pool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Performance: Tomcat Timeout
server.tomcat.connection-timeout=20000

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.org.springframework.web.reactive.function.client=DEBUG
logging.level.reactor.netty.http.client=DEBUG

# Hot Reload Configuration (Docker on Windows)
spring.devtools.restart.enabled=${SPRING_DEVTOOLS_RESTART_ENABLED:true}
spring.devtools.restart.poll-interval=${SPRING_DEVTOOLS_RESTART_POLL_INTERVAL:3s}
spring.devtools.restart.quiet-period=${SPRING_DEVTOOLS_RESTART_QUIET_PERIOD:2s}
spring.devtools.restart.additional-exclude=.gradle/**,.git/**

# Jackson Configuration
spring.jackson.serialization.fail-on-empty-beans=false

# AI Chatbot
google.gemini.api-key=${GEMINI_API_KEY}
google.gemini.model=${GOOGLE_GEMINI_MODEL}
google.gemini.base-url=${GOOGLE_GEMINI_BASE_URL}
google.gemini.timeout-ms=${GEMINI_TIMEOUT_MS}

# OpenAI Chatbot
openai.api-key=${OPENAI_API_KEY}
openai.model=${OPENAI_MODEL}
openai.base-url=${OPENAI_BASE_URL}

# Anthropic Claude Chatbot
claude.api-key=${CLAUDE_API_KEY}
claude.model=${CLAUDE_MODEL}
claude.base-url=${CLAUDE_BASE_URL}

# DeepSeek Chatbot
deepseek.api-key=${DEEPSEEK_API_KEY}
deepseek.model=${DEEPSEEK_MODEL}
deepseek.base-url=${DEEPSEEK_BASE_URL}

# Spring AI Configuration (OpenAI as primary for MCP)
# OpenAiChatAutoConfiguration is @ConditionalOnProperty(matchIfMissing = true), so it
# runs unless this says otherwise - and its openAiApi bean does Assert.hasText(apiKey),
# which fails STARTUP (not the first call) when OPENAI_API_KEY is blank. Default 'none'
# keeps the app bootable with no keys; AiChatServiceImpl takes ChatClient.Builder via
# ObjectProvider and tolerates its absence. Set to 'openai' only together with a real
# OPENAI_API_KEY - that is what the MCP / Spring AI chat path needs.
spring.ai.model.chat=${SPRING_AI_MODEL_CHAT:none}
# Must be switched off together with the line above. ChatClientAutoConfiguration is
# @ConditionalOnProperty(matchIfMissing = true) and its chatClientBuilder REQUIRES a
# ChatModel bean, so leaving it on while no provider is selected fails startup with
# "required a bean of type 'ChatModel' that could not be found". Set both to enable:
#   SPRING_AI_MODEL_CHAT=openai  +  SPRING_AI_CHAT_CLIENT_ENABLED=true  + a real key.
spring.ai.chat.client.enabled=${SPRING_AI_CHAT_CLIENT_ENABLED:false}
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}

