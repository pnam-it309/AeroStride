# Local development profile: boot backend without depending on external MySQL/Redis.
spring.datasource.url=jdbc:h2:file:./.local-db/aerostride;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false
spring.cache.type=none
spring.data.redis.repositories.enabled=false
app.local-upload-dir=.local-uploads
