# Test Configuration
spring.application.name=AeroStride-BE-Test
spring.profiles.active=test

# Server Configuration
server.port=8081
app.base_url=http://localhost:8081
app.api_prefix=/api/v1

# Database Configuration (Using H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Batch Metadata (Fix for Spring Boot 3 / Spring Batch 5)
spring.batch.jdbc.initialize-schema=never
spring.batch.job.enabled=false

# Flyway Configuration (Disable for unit tests)
spring.flyway.enabled=false

# Mail Configuration
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@example.com
spring.mail.password=password
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.debug=false

# Custom App Properties
allowed.origin=http://localhost:3000

# Cloudinary Configuration
cloudinary.cloud_name=test
cloudinary.api_key=test
cloudinary.api_secret=test

# Redis Configuration (Disable during tests)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.repositories.enabled=false
spring.cache.type=none

# VNPay Configuration
vnpay.tmn_code=testman
vnpay.hash_secret=testsecret
vnpay.url=https://vnpay.test/payment
vnpay.client_ip=127.0.0.1

# Order Configuration
order.cleanup.threshold_ms=3600000

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=3600000
jwt.refresh_expiration=86400000

# Actuator Configuration
management.endpoints.web.exposure.include=health

