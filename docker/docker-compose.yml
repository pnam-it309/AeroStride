x-common: &common
  restart: ${DOCKER_RESTART_POLICY}
  networks:
    - ${DOCKER_NETWORK}

x-java-env: &java-env
  TZ: ${APP_TZ}

services:
  redis:
    image: ${REDIS_IMAGE}
    container_name: aerostride-redis
    <<: *common
    # Published so a backend running on the HOST can reach it. Redis is not just a
    # cache here - TokenBlacklistService, RateLimiterAspect and the chat services
    # use RedisTemplate directly, so logout and rate limiting break without it.
    ports:
      - "${REDIS_PORT_HOST}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT}
        reservations:
          memory: ${REDIS_MEMORY_RESERVATION}



  mysql:
    image: ${MYSQL_IMAGE}
    container_name: aerostride-mysql
    <<: *common
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT_HOST}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: ${MYSQL_MEMORY_LIMIT}
        reservations:
          memory: ${MYSQL_MEMORY_RESERVATION}

  backend:
    image: ${BACKEND_IMAGE}
    build:
      context: ..
      dockerfile: docker/BE.Dockerfile
      target: ${DOCKER_BE_TARGET}
      args:
        - BE_PORT=${BE_INTERNAL_PORT}
    container_name: aerostride-be
    <<: *common
    env_file:
      - .env
    environment:
      <<: *java-env
      SERVER_PORT: ${SERVER_PORT}
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT}:${BE_INTERNAL_PORT}"
    volumes:
      - ${DOCKER_BE_VOL_APP}
      - be-build:/app/build
      - be-gradle:/app/.gradle
      # Shield container from host BE/gradle.properties (may contain ${ENV} placeholders)
      - ${DOCKER_BE_GRADLE_PROPS}
      # Shield container from host BE/env/.env. BeApplication.main scans "env"
      # relative to WORKDIR (=/app, which is the BE bind mount) and force-writes
      # every SPRING_*/JWT_* key it finds into System properties, overriding what
      # compose passed in. A host .env aimed at localhost:3307 would therefore
      # point the CONTAINER at itself instead of the mysql service. This empty
      # volume hides that directory so the container always uses its real env.
      - be-env-shield:/app/env
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${SERVER_PORT}/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: ${BACKEND_MEMORY_LIMIT}
        reservations:
          memory: ${BACKEND_MEMORY_RESERVATION}

  frontend:
    image: ${FRONTEND_IMAGE}
    build:
      context: ..
      dockerfile: docker/FE.Dockerfile
      target: ${DOCKER_FE_TARGET}
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_WS_URL=${VITE_WS_URL}
        - VITE_APP_URL=${VITE_APP_URL}
        - FE_DEV_PORT=${FE_DEV_PORT}
        - NGINX_PORT=${NGINX_PORT}
    container_name: aerostride-fe
    <<: *common
    environment:
      - BACKEND_HOST=aerostride-be
      - BACKEND_PORT=${BACKEND_PORT}
      - NGINX_PORT=${NGINX_PORT}
      - SERVER_NAME=${SERVER_NAME}
      - NGINX_ROOT=${NGINX_ROOT_FE}
      - FE_DEV_PORT=${FE_DEV_PORT}
      - CHOKIDAR_USEPOLLING=false
      - WATCHPACK_POLLING=false
    ports:
      - "${FE_PORTExternal}:${FE_INTERNAL_PORT}"
    volumes:
      - ${DOCKER_FE_VOL_APP}
      - fe-node-modules:/app/node_modules
    env_file:
      - .env
    depends_on:
      # service_started, not service_healthy: the backend healthcheck allows a
      # 120s start_period, and waiting on it meant frontend-only edits could not
      # be seen until the whole backend had booted. Vite tolerates a 502 until
      # the backend is up.
      backend:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: ${FRONTEND_CPU_LIMIT}
          memory: ${FRONTEND_MEMORY_LIMIT}
        reservations:
          cpus: ${FRONTEND_CPU_RESERVATION}
          memory: ${FRONTEND_MEMORY_RESERVATION}

  mobile:
    image: ${MOBILE_IMAGE}
    build:
      context: ..
      dockerfile: docker/MOBILE.Dockerfile
      target: ${DOCKER_MOBILE_TARGET}
      args:
        - MOBILE_PORT=${MOBILE_INTERNAL_PORT}
    container_name: aerostride-mobile
    <<: *common
    env_file:
      - .env
    environment:
      - MOBILE_PORT=${MOBILE_INTERNAL_PORT}
      # The browser runs on the host, so it reaches the backend through the
      # published port, not through the compose network.
      - EXPO_PUBLIC_API_URL=${EXPO_PUBLIC_API_URL}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    ports:
      - "${MOBILE_PORT_HOST}:${MOBILE_INTERNAL_PORT}"
    volumes:
      - ${DOCKER_MOBILE_VOL_APP}
      - mobile-node-modules:/app/node_modules
      # Metro's cache is thousands of small files; keep it off the bind mount.
      - mobile-metro-cache:/app/.expo
    depends_on:
      backend:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: ${MOBILE_MEMORY_LIMIT}
        reservations:
          memory: ${MOBILE_MEMORY_RESERVATION}

  mcp-server:
    image: ${MCP_SERVER_IMAGE}
    build:
      context: ../mcp-server
      dockerfile: Dockerfile
    container_name: aerostride-mcp-server
    <<: *common
    env_file:
      - .env
    environment:
      # Set here rather than in .env: the shared env_file is loaded by every
      # service, and a bare PORT would leak into all of them.
      - PORT=${MCP_SERVER_PORT}
    ports:
      - "${MCP_SERVER_PORT_HOST}:${MCP_SERVER_PORT}"
    profiles:
      - full
    deploy:
      resources:
        limits:
          memory: ${MCP_SERVER_MEMORY_LIMIT}
        reservations:
          memory: ${MCP_SERVER_MEMORY_RESERVATION}

  nginx-proxy:
    image: ${NGINX_IMAGE}
    container_name: aerostride-nginx
    <<: *common
    ports:
      - "${HTTP_PORT_HOST}:${NGINX_PORT}"
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template
    environment:
      - NGINX_PORT=${NGINX_PORT}
      - SERVER_NAME=${SERVER_NAME}
      - BACKEND_PORT=${BACKEND_PORT}
      - FE_INTERNAL_PORT=${FE_INTERNAL_PORT}
      - BACKEND_HOST=${BACKEND_HOST}
      - NGINX_ROOT=${NGINX_ROOT_PROXY}
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    profiles:
      - full

networks:
  aerostride-net:
    driver: bridge

volumes:
  be-build:
  be-gradle:
  be-env-shield:
  fe-node-modules:
  mobile-node-modules:
  mobile-metro-cache:
  mysql-data: