# version: '3.8' (Obsolete in Compose V2)

services:
  db:
    image: mysql:8.0
    container_name: aerostride-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "${MYSQL_PORT_HOST:-3307}:${MYSQL_PORT_INTERNAL:-3306}"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - aerostride-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      timeout: 10s
      retries: 5
      interval: 10s

  backend:
    image: ${BACKEND_IMAGE:-aerostride-be:latest}
    build:
      context: ..
      dockerfile: docker/BE.Dockerfile
    container_name: aerostride-be
    restart: always
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      SPRING_FLYWAY_CLEAN_DISABLED: "false"
      SPRING_FLYWAY_CLEAN_ON_VALIDATION_ERROR: "true"
      SERVER_FORWARD_HEADERS_STRATEGY: native
      SERVER_PORT: ${BE_PORTInternal:-8080}
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "${BE_PORTExternal:-8080}:${BE_PORTInternal:-8080}"
    networks:
      - aerostride-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BE_PORTInternal:-8080}/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s

  redis:
    image: redis:alpine
    container_name: aerostride-redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - aerostride-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: ${FRONTEND_IMAGE:-aerostride-fe:latest}
    build:
      context: ..
      dockerfile: docker/FE.Dockerfile
    container_name: aerostride-fe
    restart: always
    ports:
      - "${FE_PORTExternal:-80}:${FE_PORTInternal:-8080}"
    volumes:
      - fe-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - BACKEND_PORT=${BE_PORTInternal:-8080}
      - NGINX_PORT=${FE_PORTInternal:-8080}
    networks:
      - aerostride-net

networks:
  aerostride-net:
    driver: bridge

volumes:
  mysql-data:
  be-build:
  be-gradle:
  fe-node-modules:
