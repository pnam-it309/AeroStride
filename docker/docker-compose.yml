# version: '3.8' (Obsolete in Compose V2)

services:
  db:
    image: mysql:8.0
    container_name: aerostride-db
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - aerostride-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      timeout: 10s
      retries: 5
      interval: 10s

  backend:
    image: ${BACKEND_IMAGE:-aerostride-be:latest}
    build:
      context: ..
      dockerfile: docker/BE.Dockerfile
      target: development
    container_name: aerostride-be
    restart: "on-failure:3"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      SPRING_FLYWAY_CLEAN_DISABLED: "false"
      SPRING_FLYWAY_CLEAN_ON_VALIDATION_ERROR: "true"
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ../BE:/app
      - be-build:/app/build
      - be-gradle:/app/.gradle
    networks:
      - aerostride-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s

  redis:
    image: redis:alpine
    container_name: aerostride-redis
    restart: "no"
    ports:
      - "6379:6379"
    networks:
      - aerostride-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: ${FRONTEND_IMAGE:-aerostride-fe:latest}
    build:
      context: ..
      dockerfile: docker/FE.Dockerfile
      target: development
    container_name: aerostride-fe
    restart: "no"
    ports:
      - "5173:5173"
    volumes:
      - ../FE:/app
      - fe-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started
    environment:
      - VITE_API_URL=${VITE_API_URL}
    networks:
      - aerostride-net

networks:
  aerostride-net:
    driver: bridge

volumes:
  mysql-data:
  be-build:
  be-gradle:
  fe-node-modules:
