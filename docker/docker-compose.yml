x-common: &common
  restart: always
  networks:
    - aerostride-net

x-java-env: &java-env
  TZ: UTC

services:
  redis:
    image: ${REDIS_IMAGE}
    container_name: aerostride-redis
    <<: *common
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  mongo:
    image: ${MONGO_IMAGE}
    container_name: aerostride-mongo
    <<: *common
    ports:
      - "${MONGO_PORT_HOST}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  mysql:
    image: ${MYSQL_IMAGE}
    container_name: aerostride-mysql
    <<: *common
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT_HOST}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  backend:
    image: ${BACKEND_IMAGE}
    build:
      context: ..
      dockerfile: docker/BE.Dockerfile
      target: ${DOCKER_BE_TARGET}
      args:
        - BE_PORT=${BE_INTERNAL_PORT}
    container_name: aerostride-be
    <<: *common
    env_file:
      - .env
    environment:
      <<: *java-env
      SERVER_PORT: ${SERVER_PORT}
      WATCHPACK_POLLING: "true"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT}:${BE_INTERNAL_PORT}"
    volumes:
      - ${DOCKER_BE_VOL_APP}
      - be-build:/app/build
      - be-gradle:/app/.gradle
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${SERVER_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  frontend:
    image: ${FRONTEND_IMAGE}
    build:
      context: ..
      dockerfile: docker/FE.Dockerfile
      target: ${DOCKER_FE_TARGET}
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_WS_URL=${VITE_WS_URL}
        - VITE_APP_NAME=${VITE_APP_NAME}
        - VITE_APP_VERSION=${VITE_APP_VERSION}
        - VITE_APP_ENV=${VITE_APP_ENV}
        - FE_DEV_PORT=${FE_DEV_PORT}
        - NGINX_PORT=${NGINX_PORT}
    container_name: aerostride-fe
    <<: *common
    environment:
      - BACKEND_HOST=aerostride-be
      - BACKEND_PORT=${BACKEND_PORT}
      - NGINX_PORT=${NGINX_PORT}
      - SERVER_NAME=${SERVER_NAME}
      - NGINX_ROOT=${NGINX_ROOT_FE}
      - FE_DEV_PORT=${FE_DEV_PORT}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    ports:
      - "${FE_PORTExternal}:${FE_INTERNAL_PORT}"
    volumes:
      - ${DOCKER_FE_VOL_APP}
      - fe-node-modules:/app/node_modules
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  mcp-server:
    build:
      context: ../mcp-server
      dockerfile: Dockerfile
    container_name: aerostride-mcp-server
    <<: *common
    env_file:
      - .env
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  phpmyadmin:
    image: ${PHPMYADMIN_IMAGE}
    container_name: aerostride-phpmyadmin
    <<: *common
    environment:
      PMA_HOST: ${MYSQL_HOST}
      PMA_PORT: ${MYSQL_PORT}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${PHPMYADMIN_PORT_HOST}:${PHPMYADMIN_PORT_INTERNAL}"
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  nginx-proxy:
    image: ${NGINX_IMAGE}
    container_name: aerostride-nginx
    <<: *common
    ports:
      - "${HTTP_PORT_HOST}:${NGINX_PORT}"
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template
    environment:
      - NGINX_PORT=${NGINX_PORT}
      - SERVER_NAME=${SERVER_NAME}
      - BACKEND_PORT=${BACKEND_PORT}
      - FE_INTERNAL_PORT=${FE_INTERNAL_PORT}
      - BACKEND_HOST=${BACKEND_HOST}
      - NGINX_ROOT=${NGINX_ROOT_PROXY}
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

networks:
  aerostride-net:
    driver: bridge

volumes:
  be-build:
  be-gradle:
  fe-node-modules:
  mysql-data:
  mongo-data: