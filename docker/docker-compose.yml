x-common: &common
  restart: ${DOCKER_RESTART_POLICY}
  networks:
    - ${DOCKER_NETWORK}

x-java-env: &java-env
  TZ: ${APP_TZ}

services:
  redis:
    image: ${REDIS_IMAGE}
    container_name: aerostride-redis
    <<: *common
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT}
        reservations:
          memory: ${REDIS_MEMORY_RESERVATION}

  mongo:
    image: ${MONGO_IMAGE}
    container_name: aerostride-mongo
    <<: *common
    ports:
      - "${MONGO_PORT_HOST}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles:
      - full
    deploy:
      resources:
        limits:
          memory: ${MONGO_MEMORY_LIMIT}
        reservations:
          memory: ${MONGO_MEMORY_RESERVATION}

  mysql:
    image: ${MYSQL_IMAGE}
    container_name: aerostride-mysql
    <<: *common
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT_HOST}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: ${MYSQL_MEMORY_LIMIT}
        reservations:
          memory: ${MYSQL_MEMORY_RESERVATION}

  backend:
    image: ${BACKEND_IMAGE}
    build:
      context: ..
      dockerfile: docker/BE.Dockerfile
      target: ${DOCKER_BE_TARGET}
      args:
        - BE_PORT=${BE_INTERNAL_PORT}
    container_name: aerostride-be
    <<: *common
    env_file:
      - .env
    environment:
      <<: *java-env
      SERVER_PORT: ${SERVER_PORT}
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT}:${BE_INTERNAL_PORT}"
    volumes:
      - ${DOCKER_BE_VOL_APP}
      - be-build:/app/build
      - be-gradle:/app/.gradle
      # Shield container from host BE/gradle.properties (may contain ${ENV} placeholders)
      - ${DOCKER_BE_GRADLE_PROPS}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${SERVER_PORT}/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: ${BACKEND_MEMORY_LIMIT}
        reservations:
          memory: ${BACKEND_MEMORY_RESERVATION}

  frontend:
    image: ${FRONTEND_IMAGE}
    build:
      context: ..
      dockerfile: docker/FE.Dockerfile
      target: ${DOCKER_FE_TARGET}
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_WS_URL=${VITE_WS_URL}
        - VITE_APP_NAME=${VITE_APP_NAME}
        - VITE_APP_VERSION=${VITE_APP_VERSION}
        - VITE_APP_ENV=${VITE_APP_ENV}
        - FE_DEV_PORT=${FE_DEV_PORT}
        - NGINX_PORT=${NGINX_PORT}
    container_name: aerostride-fe
    <<: *common
    environment:
      - BACKEND_HOST=aerostride-be
      - BACKEND_PORT=${BACKEND_PORT}
      - NGINX_PORT=${NGINX_PORT}
      - SERVER_NAME=${SERVER_NAME}
      - NGINX_ROOT=${NGINX_ROOT_FE}
      - FE_DEV_PORT=${FE_DEV_PORT}
      - CHOKIDAR_USEPOLLING=false
      - WATCHPACK_POLLING=false
    ports:
      - "${FE_PORTExternal}:${FE_INTERNAL_PORT}"
    volumes:
      - ${DOCKER_FE_VOL_APP}
      - fe-node-modules:/app/node_modules
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: ${FRONTEND_CPU_LIMIT}
          memory: ${FRONTEND_MEMORY_LIMIT}
        reservations:
          cpus: ${FRONTEND_CPU_RESERVATION}
          memory: ${FRONTEND_MEMORY_RESERVATION}

  mcp-server:
    build:
      context: ../mcp-server
      dockerfile: Dockerfile
    container_name: aerostride-mcp-server
    <<: *common
    env_file:
      - .env
    ports:
      - "3000:3000"
    profiles:
      - full
    deploy:
      resources:
        limits:
          memory: ${MCP_SERVER_MEMORY_LIMIT}
        reservations:
          memory: ${MCP_SERVER_MEMORY_RESERVATION}

  phpmyadmin:
    image: ${PHPMYADMIN_IMAGE}
    container_name: aerostride-phpmyadmin
    <<: *common
    environment:
      PMA_HOST: ${MYSQL_HOST}
      PMA_PORT: ${MYSQL_PORT}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${PHPMYADMIN_PORT_HOST}:${PHPMYADMIN_PORT_INTERNAL}"
    depends_on:
      mysql:
        condition: service_healthy
    profiles:
      - full
    deploy:
      resources:
        limits:
          memory: ${PHPMYADMIN_MEMORY_LIMIT}
        reservations:
          memory: ${PHPMYADMIN_MEMORY_RESERVATION}

  nginx-proxy:
    image: ${NGINX_IMAGE}
    container_name: aerostride-nginx
    <<: *common
    ports:
      - "${HTTP_PORT_HOST}:${NGINX_PORT}"
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template
    environment:
      - NGINX_PORT=${NGINX_PORT}
      - SERVER_NAME=${SERVER_NAME}
      - BACKEND_PORT=${BACKEND_PORT}
      - FE_INTERNAL_PORT=${FE_INTERNAL_PORT}
      - BACKEND_HOST=${BACKEND_HOST}
      - NGINX_ROOT=${NGINX_ROOT_PROXY}
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    profiles:
      - full

networks:
  aerostride-net:
    driver: bridge

volumes:
  be-build:
  be-gradle:
  fe-node-modules:
  mysql-data:
  mongo-data: