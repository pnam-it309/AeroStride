services:
  backend:
    image: ${BACKEND_IMAGE}
    container_name: aerostride-be
    restart: always
    env_file:
      - .env
    environment:
      # Spring Boot sẽ ưu tiên các biến này [cite: 4]
      SERVER_PORT: ${BACKEND_PORT}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    networks:
      - aerostride-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT}/api/v1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  redis:
    image: redis:alpine
    container_name: aerostride-redis
    restart: always
    networks:
      - aerostride-net

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: aerostride-fe
    restart: always
    environment:
      # Các biến này sẽ được nhúng vào /etc/nginx/conf.d/default.conf [cite: 6]
      - BACKEND_PORT=${BACKEND_PORT}
      - NGINX_PORT=${NGINX_PORT}
    ports:
      - "${FE_PORTExternal:-80}:${NGINX_PORT}"
    depends_on:
      backend:
        condition: service_started
    networks:
      - aerostride-net

networks:
  aerostride-net:
    driver: bridge