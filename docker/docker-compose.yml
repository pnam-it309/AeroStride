services:
  redis:
    image: redis:alpine
    container_name: aerostride-redis
    restart: always
    networks:
      - aerostride-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  mysql:
    image: mysql:8.0
    container_name: aerostride-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT_HOST}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - aerostride-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  backend:
    image: ${BACKEND_IMAGE}
    build:
      context: ..
      dockerfile: docker/BE.Dockerfile
      target: ${DOCKER_BE_TARGET}
      args:
        - BE_PORT=${BE_INTERNAL_PORT}
    container_name: aerostride-be
    restart: always
    env_file:
      - .env
    environment:
      SERVER_PORT: ${SERVER_PORT}
      WATCHPACK_POLLING: "true"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    links:
      - mysql:mysql
    ports:
      - "${BACKEND_PORT}:${BE_INTERNAL_PORT}"
    volumes:
      - ${DOCKER_BE_VOL_APP}
      - be-build:/app/build
      - be-gradle:/app/.gradle
    networks:
      - aerostride-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  frontend:
    image: ${FRONTEND_IMAGE}
    build:
      context: ..
      dockerfile: docker/FE.Dockerfile
      target: ${DOCKER_FE_TARGET}
      args:
        - VITE_API_URL=${VITE_API_URL}
        - FE_DEV_PORT=${FE_DEV_PORT}
        - NGINX_PORT=${NGINX_PORT}
    container_name: aerostride-fe
    restart: always
    environment:
      - BACKEND_HOST=aerostride-be
      - BACKEND_PORT=${BACKEND_PORT}
      - NGINX_PORT=${NGINX_PORT}
      - SERVER_NAME=${SERVER_NAME}
      - FE_DEV_PORT=${FE_DEV_PORT}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    ports:
      - "${FE_PORTExternal}:${FE_INTERNAL_PORT}"
    volumes:
      - ${DOCKER_FE_VOL_APP}
      - fe-node-modules:/app/node_modules
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_started
    networks:
      - aerostride-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

networks:
  aerostride-net:
    driver: bridge

volumes:
  be-build:
  be-gradle:
  fe-node-modules:
  mysql-data: