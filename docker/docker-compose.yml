services:
  redis:
    image: redis:alpine
    container_name: aerostride-redis
    restart: always
    networks:
      - aerostride-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-aerostride-be:latest}
    container_name: aerostride-be
    restart: always
    env_file:
      - .env
    environment:
      SERVER_PORT: ${BACKEND_PORT:-8080}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"
    networks:
      - aerostride-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT:-8080}/api/v1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    image: ${FRONTEND_IMAGE:-aerostride-fe:latest}
    container_name: aerostride-fe
    restart: always
    environment:
      - BACKEND_PORT=${BACKEND_PORT:-8080}
      - NGINX_PORT=${NGINX_PORT:-8080}
    ports:
      - "${FE_PORTExternal:-80}:${NGINX_PORT:-8080}"
    depends_on:
      backend:
        condition: service_started
    networks:
      - aerostride-net

networks:
  aerostride-net:
    driver: bridge